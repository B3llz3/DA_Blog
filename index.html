<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LandingPage</title>
  <link rel="stylesheet" href="./css/index.css" />
  <link rel="stylesheet" href="./css/components.css" />
  <link rel="stylesheet" href="./css/layout.css" />
  <link rel="stylesheet" href="./css/variables.css" />
  <link rel="stylesheet" href="./css/font.css" />
</head>

<body>
  <header></header>
  <main>
    <!-- Daniel -->
    <section class="hero-section"></section>
    <!-- Alexander -->
    <section class="highlights"></section>
    <!-- Steffen -->
    <section class="faq"></section>
    <!-- Oliver -->
    <section class="contact-form">
      <div contact-text>
        <div class="contact-text-headline">
          <img src="./assets/icons/person_pin.svg" alt="bild">
          <h2>Contact form</h2>
        </div>
        <p>Have a question or an idea to collaborate?
          Get in touch—I’d love to hear from you and explore how we can work together.</p>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="name">What's your Name?</label><br>
          <input type="text" id="name" name="name">
        </div>
        <div class="form-group">
          <label for="email">What's your email?</label><br>
          <input type="text" id="email" name="email">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="help">How can I help?</label><br>
          <input type="text" id="help" name="help">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <input type="checkbox" id="policy" name="policy" value="policy">
          <label for="policy"> I've read the privacy policy and agree to the processing of my data as outlined</label>
        </div>
      </div>
      <input type="submit" value="Send">
    </section>
  </main>
  <footer></footer>
</body>

</html>

  <summary>Update News:</summary>
